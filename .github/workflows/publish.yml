name: publish my docker



on:
  release:
    types: [published]
  push:
    branches: [ main ]
  
jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v5

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{github.actor}}
          password: ${{secrets.GITHUB_TOKEN}}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ghcr.io/gottagitgoing/test-docker:latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      